name: CubeSat CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (ARM Cross-Compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Configure CMake
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=cmake/arm-none-eabi.cmake

      - name: Build
        run: cmake --build build

      - name: Size report
        run: arm-none-eabi-size build/cubesat-kit.elf

      - name: Upload ELF
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/cubesat-kit.elf

  test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Ceedling
        run: gem install ceedling

      - name: Install gcovr
        run: pip install gcovr

      - name: Run tests
        run: ceedling test:all

      - name: Generate coverage report
        run: ceedling gcov:all

  analyze:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=all --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=missingInclude \
            --suppress=unusedFunction \
            --suppress=staticFunction \
            --suppress=knownConditionTrueFalse \
            --suppress=checkersReport \
            --suppress=unmatchedSuppression \
            -I src/hal -I src/subsystems -I src/app \
            -I config \
            -DSTM32F407xx -DUNIT_TEST \
            src/

  simulate:
    name: Renode SITL
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: build/

      - name: Run Renode test
        uses: antmicro/renode-test-action@v5
        with:
          tests-to-run: sim/tests/test_boot.robot
